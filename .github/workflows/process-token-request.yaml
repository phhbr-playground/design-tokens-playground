name: Process Token Request

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-token:
    if: contains(github.event.issue.labels.*.name, 'token-request')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Parse creation issue
        id: parse_create
        if: contains(github.event.issue.labels.*.name, 'create')
        uses: issue-ops/parser@v5
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: create-token.yaml

      - name: Parse deletion issue
        id: parse_delete
        if: contains(github.event.issue.labels.*.name, 'delete')
        uses: issue-ops/parser@v5
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: delete-token.yaml

      - name: Parse update issue
        id: parse_update
        if: contains(github.event.issue.labels.*.name, 'update')
        uses: issue-ops/parser@v5
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: update-token.yaml

      - name: Consolidate parsed data
        id: parsed
        run: |
          # Extract action from labels
          LABELS="${{ toJSON(github.event.issue.labels.*.name) }}"
          if echo "$LABELS" | grep -q "create"; then
            ACTION="create"
          elif echo "$LABELS" | grep -q "delete"; then
            ACTION="delete"
          elif echo "$LABELS" | grep -q "update"; then
            ACTION="update"
          else
            ACTION=""
          fi
          
          # Get parsed output from whichever step ran
          if [ "$ACTION" = "create" ]; then
            PARSED_DATA="${{ steps.parse_create.outputs.json }}"
          elif [ "$ACTION" = "delete" ]; then
            PARSED_DATA="${{ steps.parse_delete.outputs.json }}"
          elif [ "$ACTION" = "update" ]; then
            PARSED_DATA="${{ steps.parse_update.outputs.json }}"
          fi
          
          echo "action=$ACTION" >> $GITHUB_OUTPUT
          echo "data=$PARSED_DATA" >> $GITHUB_OUTPUT

      - name: Create branch for changes
        id: branch
        run: |
          BRANCH_NAME="token-request/${{ github.event.issue.number }}-$(echo '${{ github.event.issue.title }}' | sed 's/\[.*\] //' | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-' | head -c 50)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"

      - name: Process token change
        id: process
        run: |
          # Parse JSON to extract fields
          DATA='${{ steps.parsed.outputs.data }}'
          ACTION='${{ steps.parsed.outputs.action }}'
          
          # Extract fields from JSON (compatible with issue-ops/parser output)
          CATEGORY=$(echo "$DATA" | jq -r '.category // empty' 2>/dev/null || echo "")
          NAME=$(echo "$DATA" | jq -r '.name // empty' 2>/dev/null || echo "")
          VALUE=$(echo "$DATA" | jq -r '.value // empty' 2>/dev/null || echo "")
          GROUP=$(echo "$DATA" | jq -r '.group // empty' 2>/dev/null || echo "")
          TOKEN_PATH=$(echo "$DATA" | jq -r '.["token-path"] // empty' 2>/dev/null || echo "")
          DESCRIPTION=$(echo "$DATA" | jq -r '.description // empty' 2>/dev/null || echo "")
          
          # Build arguments
          ARGS="--action=$ACTION --category=$CATEGORY"
          [ -n "$NAME" ] && ARGS="$ARGS --name=$NAME"
          [ -n "$VALUE" ] && ARGS="$ARGS --value=$VALUE"
          [ -n "$GROUP" ] && ARGS="$ARGS --group=$GROUP"
          [ -n "$TOKEN_PATH" ] && ARGS="$ARGS --token-path=$TOKEN_PATH"
          [ -n "$DESCRIPTION" ] && ARGS="$ARGS --description=$DESCRIPTION"
          
          npx tsx .github/scripts/process-token.ts $ARGS

      - name: Build tokens to validate
        run: npm run build

      - name: Commit and push changes
        id: commit
        run: |
          git add tokens/
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            git commit -m "feat(tokens): ${{ github.event.issue.title }}

            Closes #${{ github.event.issue.number }}"
            git push origin "${{ steps.branch.outputs.branch_name }}"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.commit.outputs.changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tokenData = JSON.parse('${{ steps.parsed.outputs.data }}');
            
            const prBody = `## Token Change Request
            
            This PR was automatically generated from issue #${{ github.event.issue.number }}.
            
            ### Details
            - **Action**: ${{ steps.parsed.outputs.action }}
            - **Category**: ${tokenData.category}
            - **Token**: ${tokenData.name || tokenData['token-path']}
            ${tokenData.value ? `- **Value**: \`${tokenData.value}\`` : ''}
            
            ### Description
            ${tokenData.description || 'No description provided.'}
            
            ---
            
            **Reviewers**: Please verify the token change is correct before merging.
            
            Closes #${{ github.event.issue.number }}`;
            
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: context.payload.issue.title,
              head: '${{ steps.branch.outputs.branch_name }}',
              base: 'main',
              body: prBody
            });
            
            // Link PR to issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `✅ Pull request created: #${pr.data.number}\n\nYour token change is ready for review.`
            });
            
            // Add labels to PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['token-change', '${{ steps.parsed.outputs.action }}']
            });

      - name: Handle no changes
        if: steps.commit.outputs.changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `⚠️ No changes were made. This could mean:
              - The token already exists with the same value
              - The token path could not be found (for updates/deletes)
              - There was an issue parsing the request
              
              Please verify the details and try again, or contact a maintainer for help.`
            });

name: Process Token Request

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-token:
    if: contains(github.event.issue.labels.*.name, 'token-request')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Parse creation issue
        id: parse_create
        if: contains(github.event.issue.labels.*.name, 'create')
        uses: issue-ops/parser@v5
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: create-token.yaml

      - name: Parse deletion issue
        id: parse_delete
        if: contains(github.event.issue.labels.*.name, 'delete')
        uses: issue-ops/parser@v5
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: delete-token.yaml

      - name: Parse update issue
        id: parse_update
        if: contains(github.event.issue.labels.*.name, 'update')
        uses: issue-ops/parser@v5
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: update-token.yaml

      - name: Consolidate parsed data
        id: parsed
        run: |
          echo "json=${{ steps.parse_create.outputs.json || steps.parse_delete.outputs.json || steps.parse_update.outputs.json }}" >> $GITHUB_OUTPUT

      - name: Create branch for changes
        id: branch
        run: |
          BRANCH_NAME="token-request/${{ github.event.issue.number }}-$(echo '${{ github.event.issue.title }}' | sed 's/\[.*\] //' | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-' | head -c 50)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"

      - name: Process token change
        id: process
        run: |
          npx tsx .github/scripts/process-token.ts '${{ steps.parsed.outputs.json }}'

      - name: Build tokens to validate
        run: npm run build

      - name: Commit and push changes
        id: commit
        run: |
          git add tokens/
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            git commit -m "feat(tokens): ${{ github.event.issue.title }}

            Closes #${{ github.event.issue.number }}"
            git push origin "${{ steps.branch.outputs.branch_name }}"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.commit.outputs.changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tokenData = JSON.parse('${{ steps.parsed.outputs.json }}');
            
            const prBody = `## Token Change Request
            
            This PR was automatically generated from issue #${tokenData.issueNumber}.
            
            ### Details
            - **Action**: ${tokenData.action.toUpperCase()}
            - **Category**: ${tokenData.category}
            - **Token**: ${tokenData.tokenName || tokenData.tokenPath}
            ${tokenData.tokenValue ? `- **Value**: \`${tokenData.tokenValue}\`` : ''}
            
            ### Description
            ${tokenData.description || 'No description provided.'}
            
            ---
            
            **Reviewers**: Please verify the token change is correct before merging.
            
            Closes #${tokenData.issueNumber}`;
            
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: context.payload.issue.title,
              head: '${{ steps.branch.outputs.branch_name }}',
              base: 'main',
              body: prBody
            });
            
            // Link PR to issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: tokenData.issueNumber,
              body: `✅ Pull request created: #${pr.data.number}\n\nYour token change is ready for review.`
            });
            
            // Add labels to PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['token-change', tokenData.action]
            });

      - name: Handle no changes
        if: steps.commit.outputs.changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `⚠️ No changes were made. This could mean:
              - The token already exists with the same value
              - The token path could not be found (for updates/deletes)
              - There was an issue parsing the request
              
              Please verify the details and try again, or contact a maintainer for help.`
            });

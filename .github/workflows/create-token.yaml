name: Create Design Token

on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
      issue-title:
        required: true
        type: string
      issue-body:
        required: true
        type: string
      issue-action:
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create-token:
    runs-on: ubuntu-latest
    steps:
      - name: Debug event payload
        run: |
          echo "Event action: ${{ inputs.issue-action }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Parse creation issue
        id: parse
        uses: issue-ops/parser@v5
        with:
          body: ${{ inputs.issue-body }}
          issue-form-template: create-token.yaml

      - name: Create branch for changes
        id: branch
        run: |
          BRANCH_NAME="token-request/${{ inputs.issue-number }}-$(echo '${{ inputs.issue-title }}' | sed 's/\[.*\] //' | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-' | head -c 50)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"

      - name: Run create token script
        run: |
          npx tsx .github/scripts/create-token.ts \
            --namespace-level "${{ steps.parse.outputs['parsed_namespace-level'] != '' && fromJson(steps.parse.outputs['parsed_namespace-level'])[0] || '' }}" \
            --namespace-theme "${{ steps.parse.outputs['parsed_namespace-theme'] }}" \
            --namespace-domain "${{ steps.parse.outputs['parsed_namespace-domain'] != '' && fromJson(steps.parse.outputs['parsed_namespace-domain'])[0] || '' }}" \
            --object-path "${{ steps.parse.outputs['parsed_object-path'] }}" \
            --token-type "${{ steps.parse.outputs['parsed_token-type'] }}" \
            --value "${{ steps.parse.outputs.parsed_token-value }}" \
            --description "${{ steps.parse.outputs.parsed_description }}"

      - name: Commit and push changes
        id: commit
        env:
          ACTIONS_PAT: ${{ secrets.ACTIONS_PAT }}
        run: |
          git add tokens/
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            # If a PAT is provided as ACTIONS_PAT, configure remote to use it so pushes/PR creation work when GITHUB_TOKEN is restricted
            if [ -n "${ACTIONS_PAT}" ]; then
              git remote set-url origin https://x-access-token:${ACTIONS_PAT}@github.com/${{ github.repository }}
            fi

            git commit -m "feat(tokens): ${{ inputs.issue-title }}

            Closes #${{ inputs.issue-number }}"
            git push origin "${{ steps.branch.outputs.branch_name }}"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.commit.outputs.changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ACTIONS_PAT }}
          script: |
            const tokenData = JSON.parse('${{ steps.parse.outputs.json }}');

            const prBody = `## Token Change Request

            This PR was automatically generated from issue #${tokenData.issueNumber}.

            ### Details
            - **Action**: CREATE
            - **Namespace**: ${tokenData['namespace-level'] || tokenData['hierarchy-level'] || 'N/A'} / ${tokenData['namespace-theme'] || '-'} / ${tokenData['namespace-domain'] || tokenData.domain || tokenData.category || 'N/A'}
            - **Object Path**: ${tokenData['object-path'] || tokenData['token-name'] || tokenData['token-path'] || 'N/A'}
            ${tokenData['token-value'] ? `- **Value**: \`${tokenData['token-value']}\`` : ''}
            ${tokenData['token-type'] ? `- **Type**: \`${tokenData['token-type']}\`` : ''}

            ### Description
            ${tokenData.description || 'No description provided.'}

            ---

            **Reviewers**: Please verify the token change is correct before merging.

            Closes #${{ inputs.issue-number }}.`;

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '${{ inputs.issue-title }}',
              head: '${{ steps.branch.outputs.branch_name }}',
              base: 'main',
              body: prBody
            });

            // Link PR to issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.issue-number }},
              body: `✅ Pull request created: #${pr.data.number}\n\nYour token change is ready for review.`
            });

            // Add labels to PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['token-change', 'create']
            });
      - name: Handle no changes
        if: steps.commit.outputs.changes == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ACTIONS_PAT }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.issue-number }},
              body: `⚠️ No changes were made. This could mean:
              - The token already exists with the same value
              - The token path could not be found (for updates/deletes)
              - There was an issue parsing the request
              
              Please verify the details and try again, or contact a maintainer for help.`
            });

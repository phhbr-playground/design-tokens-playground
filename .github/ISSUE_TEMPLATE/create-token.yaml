name: 🎨 Create New Token
description: Request a new design token in the 4-layer hierarchy (universal → system → semantic → component)
title: "[CREATE] "
labels: ["token-request", "create"]
body:
  - type: markdown
    attributes:
      value: |
        ## Create a New Design Token

        All tokens follow the **Curtis Nathan naming convention**, composed of four
        group fields:

        ```
        {namespace}.{object}.{base}.{modifier}
        ```

        | Group      | What it captures                                   | Example                         |
        | ---------- | -------------------------------------------------- | ------------------------------- |
        | namespace  | hierarchy level + optional theme + optional domain | `system.light.color`            |
        | object     | group / component / element being styled           | `button.primary.text`           |
        | base       | category / concept / property                      | `color` or `space.padding`      |
        | modifier   | variant / state / scale / mode                     | `hover.on-light` or _(empty)_   |

        **Rules**
        - Every segment is **lowercase kebab-case** (`on-brand`, `primary-text`).
        - The `namespace` field must start with one of: `universal`, `system`, `semantic`, `component`.
        - Hierarchy references are one-layer-up only:
          universal → (none), system → universal, semantic → system, component → semantic.
        - `universal` tokens hold raw primitive values (no `{ref}`).

        **Good examples**
        - `universal.color.blue.500` → `#3B82F6`
        - `system.light.color.brand.primary` → `{universal.color.blue.500}`
        - `semantic.action.color.background.primary` → `{system.light.color.brand.primary}`
        - `component.button.primary.color.background` → `{semantic.action.color.background.primary}`

        > Only fill in the four group fields below. Leave unused groups empty — the
        > build pipeline (TokenScript + validator) will reject malformed paths.

  - type: input
    id: namespace
    attributes:
      label: Namespace
      description: |
        Hierarchy level + optional theme + optional domain, joined by `.`.
        **Required.** First segment must be `universal`, `system`, `semantic`, or `component`.
      placeholder: "system.light.color"
    validations:
      required: true

  - type: input
    id: object
    attributes:
      label: Object
      description: |
        Group / component / element that the token applies to. Optional.
      placeholder: "button.primary"
    validations:
      required: false

  - type: input
    id: base
    attributes:
      label: Base
      description: |
        Category / concept / property being styled. Optional, but strongly recommended.
      placeholder: "color.background"
    validations:
      required: false

  - type: input
    id: modifier
    attributes:
      label: Modifier
      description: |
        Variant / state / scale / mode. Optional.
      placeholder: "hover.on-light"
    validations:
      required: false

  - type: textarea
    id: token-value
    attributes:
      label: Token Value
      description: |
        Raw value, or `{path.to.token}` reference to the layer one step above.

        - Universal: raw value only — `#3B82F6`, `1rem`, `700`
        - System: reference to universal — `{universal.color.blue.500}`
        - Semantic: reference to system — `{system.light.color.brand.primary}`
        - Component: reference to semantic — `{semantic.action.color.background.primary}`
      placeholder: "#3B82F6 or {semantic.action.color.background.primary}"
    validations:
      required: true

  - type: input
    id: token-type
    attributes:
      label: Token Type
      description: "DTCG `$type` for this token."
      placeholder: "color, dimension, fontFamily, fontWeight, duration, …"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this token represent and when should it be used?
      placeholder: "Primary brand background color for main CTAs."
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-submission Checklist
      options:
        - label: The `namespace` field starts with a valid hierarchy (`universal` / `system` / `semantic` / `component`).
          required: true
        - label: All segments in every group are lowercase `kebab-case`.
          required: true
        - label: The `$value` references only tokens from the layer directly above (or is a raw value for `universal`).
          required: true
        - label: The `$type` is a valid DTCG type.
          required: true

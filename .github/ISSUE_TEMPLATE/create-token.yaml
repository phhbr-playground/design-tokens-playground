name: 🎨 Create New Token
description: Request a new design token in the 4-layer hierarchy (universal → system → semantic → component)
title: "[CREATE] "
labels: ["token-request", "create"]
body:
  - type: markdown
    attributes:
      value: |
        ## Create a New Design Token
        
        Design tokens are organized in a 4-layer hierarchy. Choose the appropriate layer for your token:
        
        **LAYER 1 - Universal**: Primitive values (colors, spacing, typography) - self-contained, no references
        **LAYER 2 - System**: Theme-aware tokens (light/dark) - references universal only
        **LAYER 3 - Semantic**: Intent-driven tokens (action, feedback) - references system only
        **LAYER 4 - Component**: UI component styles - references semantic only
        
        See [Token Hierarchy Documentation](../../README.md#4-layer-token-hierarchy) for details.

  - type: dropdown
    id: namespace-level
    attributes:
      label: Namespace - Level
      description: "Line 1 / namespace input 1: choose the hierarchy layer"
      options:
        - universal
        - system
        - semantic
        - component
    validations:
      required: true

  - type: input
    id: namespace-theme
    attributes:
      label: Namespace - Theme
      description: "Line 1 / namespace input 2: optional (mainly for system level)"
      placeholder: "light, dark, high-contrast, or leave empty"
    validations:
      required: false

  - type: dropdown
    id: namespace-domain
    attributes:
      label: Namespace - Domain
      description: "Line 1 / namespace input 3: design domain"
      options:
        - color
        - spacing
        - typography
        - size
        - duration
        - border
        - shadow
        - button
        - card
        - input
        - other
    validations:
      required: true

  - type: input
    id: object-path
    attributes:
      label: Object Path
      description: |
        Line 2: object path inside the selected namespace.
        The final token path is assembled as:
        - universal: `universal.{domain}.{object-path}`
        - system: `system.{theme?}.{domain}.{object-path}`
        - semantic: `semantic.{domain}.{object-path}`
        - component: `component.{object-path}`
      placeholder: "brand.primary or button.primary.background"
    validations:
      required: true

  - type: textarea
    id: token-value
    attributes:
      label: Token Value
      description: |
        The value for this token. For references, use `{path.to.token}` syntax.
        
        Examples:
        - Primitive color: `#3B82F6`
        - System reference: `{universal.color.blue}`
        - Semantic reference: `{system.light.color.brand.primary}`
        - Component reference: `{semantic.color.action.primary}`
      placeholder: "#3B82F6 or {universal.color.blue}"
    validations:
      required: true

  - type: input
    id: token-type
    attributes:
      label: Token Type
      description: DTCG token type (color, dimension, fontSize, fontWeight, duration, border, shadow, etc.)
      placeholder: "color or dimension"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain the purpose and intended use of this token.
      placeholder: "Primary brand color used for main CTAs and interactive elements"
    validations:
      required: true

  - type: textarea
    id: usage-examples
    attributes:
      label: Usage Examples
      description: Where and how should this token be used?
      placeholder: |
        - Primary buttons
        - Active navigation items
        - Link text color

  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked that this token does not already exist in its layer
          required: true
        - label: The namespace and object path follow naming conventions for the selected layer
          required: true
        - label: "(For non-universal): I am only referencing tokens from the layer directly above mine"
          required: true
        - label: The $type value is valid per DTCG spec
          required: true

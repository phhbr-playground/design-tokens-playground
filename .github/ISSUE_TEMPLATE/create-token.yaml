name: ­čÄĘ Create New Token
description: Request a new design token in the 5-layer hierarchy (design-values Ôćĺ universal Ôćĺ system Ôćĺ semantic Ôćĺ component)
title: "[CREATE] "
labels: ["token-request", "create"]
body:
  - type: markdown
    attributes:
      value: |
        ## Create a New Design Token

        All tokens follow the **Curtis Nathan naming convention**, composed of four
        group fields:

        ```
        {namespace}.{object}.{base}.{modifier}
        ```

        | Group      | Segments                          | Example                           |
        | ---------- | --------------------------------- | --------------------------------- |
        | namespace  | `system.theme.domain`             | `light.color`                     |
        | object     | `group.component.element`         | `button.primary.text`             |
        | base       | `category.concept.property`       | `color` or `space.padding`        |
        | modifier   | `variant.state.scale.mode`        | `hover.on-light` or _(empty)_     |

        **5-Layer Hierarchy**

        | Layer           | Can reference                                          | Example value                                        |
        | --------------- | ------------------------------------------------------ | ---------------------------------------------------- |
        | `design-values` | _(nothing ÔÇö raw primitives only)_                      | `blue.500.lightness` Ôćĺ `0.4989`                      |
        | `universal`     | `design-values`                                        | `blue.500` Ôćĺ `oklch({blue.500.lightness} ...)`       |
        | `system`        | `design-values`, `universal`                           | `color.primary` Ôćĺ `{universal.blue.500}`             |
        | `semantic`      | `design-values`, `universal`, `system`                 | `color.action.primary` Ôćĺ `{system.color.primary}`    |
        | `component`     | `design-values`, `universal`, `system`, `semantic`     | `color.background.solid` Ôćĺ `{semantic.color.action.primary}` |

        **Rules**
        - Every segment is **lowercase kebab-case** (`on-brand`, `primary-text`).
        - The hierarchy is selected separately ÔÇö do **not** include it in the token path.
        - `design-values` tokens hold raw primitive values only (no `{ref}`).
        - Each layer may reference any layer that is **below** it in the hierarchy.

        **Good examples**
        - `blue.500.lightness` Ôćĺ `0.4989`
        - `blue.500` Ôćĺ `oklch({blue.500.lightness} {blue.chroma} {blue.hue})`
        - `light.color.brand.primary` Ôćĺ `{blue.500}`
        - `action.color.background.primary` Ôćĺ `{light.color.brand.primary}`
        - `button.primary.color.background` Ôćĺ `{action.color.background.primary}`

        > Only fill in the four group fields below. Leave unused groups empty ÔÇö the
        > build pipeline (TokenScript + validator) will reject malformed paths.

  - type: dropdown
    id: hierarchy
    attributes:
      label: Hierarchy
      description: Which layer does this token belong to?
      options:
        - design-values
        - universal
        - system
        - semantic
        - component
    validations:
      required: true

  - type: input
    id: namespace
    attributes:
      label: Namespace (theme / domain)
      description: |
        Optional theme + domain ÔÇö do **not** include the hierarchy keyword.
        The Curtis Nathan segment model uses `system.theme.domain`, but the actual
        namespace value here should only contain the theme/domain portion.
        Joined by `.`.
      placeholder: "light.color"
    validations:
      required: false

  - type: input
    id: object
    attributes:
      label: Object
      description: |
        Group / component / element that the token applies to. Optional.
      placeholder: "button.primary"
    validations:
      required: false

  - type: input
    id: base
    attributes:
      label: Base
      description: |
        Category / concept / property being styled. Optional, but strongly recommended.
      placeholder: "color.background"
    validations:
      required: false

  - type: input
    id: modifier
    attributes:
      label: Modifier
      description: |
        Variant / state / scale / mode. Optional.
      placeholder: "hover.on-light"
    validations:
      required: false

  - type: textarea
    id: token-value
    attributes:
      label: Token Value
      description: |
        Raw value, or `{path.to.token}` reference to any layer below this one.

        - design-values: raw primitives only ÔÇö `0.4989`, `210`, `0.6`
        - universal: reference to design-values ÔÇö `oklch({blue.500.lightness} {blue.chroma} {blue.hue})`
        - system: reference to design-values or universal ÔÇö `{blue.500}`
        - semantic: reference to any lower layer ÔÇö `{light.color.brand.primary}`
        - component: reference to any lower layer ÔÇö `{action.color.background.primary}`
      placeholder: "0.4989 or {action.color.background.primary}"
    validations:
      required: true

  - type: input
    id: token-type
    attributes:
      label: Token Type
      description: "DTCG `$type` for this token."
      placeholder: "color, dimension, fontFamily, fontWeight, duration, ÔÇŽ"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this token represent and when should it be used?
      placeholder: "Primary brand background color for main CTAs."
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-submission Checklist
      options:
        - label: The hierarchy is one of `design-values` / `universal` / `system` / `semantic` / `component`.
          required: true
        - label: All segments in every group are lowercase `kebab-case`.
          required: true
        - label: The `$value` references only tokens from a layer **below** this one (or is a raw value for `design-values`).
          required: true
        - label: The `$type` is a valid DTCG type.
          required: true

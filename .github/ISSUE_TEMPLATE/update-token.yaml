name: ✏️ Update Existing Token
description: Request changes to an existing design token
title: "[UPDATE] "
labels: ["token-request", "update"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update an Existing Design Token
        Fill out the form below to request changes to a token. A pull request will be automatically created for review.

  - type: dropdown
    id: category
    attributes:
      label: Token Category
      description: Which category contains the token?
      options:
        - color
        - typography
        - spacing
        - shadow
        - border
        - animation
        - breakpoint
    validations:
      required: true

  - type: input
    id: token-path
    attributes:
      label: Token Path
      description: |
        The full path to the token using dot notation.
        Example: brand.primary.500 or feedback.error.background
      placeholder: "brand.primary.500"
    validations:
      required: true

  - type: textarea
    id: current-value
    attributes:
      label: Current Value
      description: What is the current value? (helps verify we're updating the right token)
      placeholder: "#3B82F6"
    validations:
      required: true

  - type: textarea
    id: new-value
    attributes:
      label: New Value
      description: What should the new value be?
      placeholder: "#2563EB"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for Change
      description: Why does this token need to be updated?
      placeholder: "Accessibility audit found insufficient contrast ratio..."
    validations:
      required: true

  - type: dropdown
    id: breaking-change
    attributes:
      label: Is this a breaking change?
      description: Will this change significantly affect existing designs?
      options:
        - "No - Minor adjustment"
        - "Yes - Significant visual change"
        - "Unsure - Needs review"
    validations:
      required: true

name: ✏️ Update Existing Token
description: Request changes to an existing design token while maintaining hierarchy rules
title: "[UPDATE] "
labels: ["token-request", "update"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update an Existing Design Token
        
        Specify which token you want to update and the changes needed. The hierarchy layer will help verify that any reference changes maintain proper inheritance rules (universal → system → semantic → component).
        
        See [Token Hierarchy Documentation](../../README.md#token-hierarchy--inheritance-rules) for details on inheritance rules.

  - type: dropdown
    id: namespace-level
    attributes:
      label: Namespace - Level
      description: "Line 1 / namespace input 1: hierarchy layer that contains this token"
      options:
        - universal
        - system
        - semantic
        - component
    validations:
      required: true

  - type: input
    id: namespace-theme
    attributes:
      label: Namespace - Theme
      description: "Line 1 / namespace input 2: optional (mainly for system level)"
      placeholder: "light, dark, high-contrast, or leave empty"
    validations:
      required: false

  - type: dropdown
    id: namespace-domain
    attributes:
      label: Namespace - Domain
      description: "Line 1 / namespace input 3: design domain"
      options:
        - color
        - spacing
        - typography
        - size
        - duration
        - border
        - shadow
        - button
        - card
        - input
        - other
    validations:
      required: true

  - type: input
    id: object-path
    attributes:
      label: Object Path
      description: |
        Line 2: object path inside the selected namespace.
        Examples:
        - universal + color + blue => `object-path: blue`
        - system + light + color + brand.primary => `object-path: brand.primary`
        - semantic + color + action.primary => `object-path: action.primary`
        - component + button.primary.background => `object-path: button.primary.background`
      placeholder: "action.primary"
    validations:
      required: true

  - type: textarea
    id: current-value
    attributes:
      label: Current Value
      description: What is the current value? (helps verify we're updating the right token)
      placeholder: "#3B82F6 or {system.light.color.brand.primary}"
    validations:
      required: true

  - type: textarea
    id: new-value
    attributes:
      label: New Value
      description: What should the new value be?
      placeholder: "#2563EB or {system.light.color.brand.secondary}"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for Change
      description: Why does this token need to be updated?
      placeholder: "Accessibility audit found insufficient contrast ratio..."
    validations:
      required: true

  - type: dropdown
    id: breaking-change
    attributes:
      label: Is this a breaking change?
      description: Will this change significantly affect existing designs?
      options:
        - "No - Minor adjustment"
        - "Yes - Significant visual change"
        - "Unsure - Needs review"
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-update Checklist
      options:
        - label: I understand this change may affect tokens in higher layers that reference this token
          required: true
        - label: "(For non-universal): I am only referencing tokens from the layer directly above mine"
          required: true
        - label: I have verified there are no circular reference issues
          required: true

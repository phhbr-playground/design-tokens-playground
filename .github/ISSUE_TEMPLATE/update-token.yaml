name: ✏️ Update Existing Token
description: Request changes to an existing design token
title: "[UPDATE] "
labels: ["token-request", "update"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update an Existing Design Token

        Identify the token with the four **Curtis Nathan** groups and provide the new value.
        Select the hierarchy from the dropdown — do **not** include it in the path.

        All segments are **lowercase kebab-case**. Hierarchy rules still apply:
        universal → (none), system → universal, semantic → system, component → semantic.

  - type: dropdown
    id: hierarchy
    attributes:
      label: Hierarchy
      description: Which layer does this token belong to?
      options:
        - universal
        - system
        - semantic
        - component
    validations:
      required: true

  - type: input
    id: namespace
    attributes:
      label: Namespace (theme / domain)
      description: Optional theme + domain — do **not** include the hierarchy keyword.
      placeholder: "light.color"
    validations:
      required: false

  - type: input
    id: object
    attributes:
      label: Object
      placeholder: "button.primary"
    validations:
      required: false

  - type: input
    id: base
    attributes:
      label: Base
      placeholder: "color.background"
    validations:
      required: false

  - type: input
    id: modifier
    attributes:
      label: Modifier
      placeholder: "hover.on-light"
    validations:
      required: false

  - type: textarea
    id: current-value
    attributes:
      label: Current Value
      description: Helps verify we are updating the right token.
      placeholder: "#3B82F6 or {light.color.brand.primary}"
    validations:
      required: true

  - type: textarea
    id: new-value
    attributes:
      label: New Value
      description: Must follow the inheritance rules for this layer.
      placeholder: "#2563EB or {light.color.brand.secondary}"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for Change
      placeholder: "Accessibility audit found insufficient contrast ratio..."
    validations:
      required: true

  - type: dropdown
    id: breaking-change
    attributes:
      label: Is this a breaking change?
      options:
        - "No — Minor adjustment"
        - "Yes — Significant visual change"
        - "Unsure — Needs review"
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-update Checklist
      options:
        - label: I understand this change may cascade to higher-layer tokens that reference this one.
          required: true
        - label: The new value references only tokens from the layer directly above (or is a raw value for `universal`).
          required: true
        - label: I have verified there are no circular reference issues.
          required: true

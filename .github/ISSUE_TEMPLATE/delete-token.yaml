name: 🗑️ Delete Token
description: Request removal of a design token
title: "[DELETE] "
labels: ["token-request", "delete"]
body:
  - type: markdown
    attributes:
      value: |
        ## Delete a Design Token

        ⚠️ **Warning**: Deleting tokens may break existing implementations and any
        higher-layer tokens that reference them.

        Identify the token with the four **Curtis Nathan** groups.
        Select the hierarchy from the dropdown — do **not** include it in the path.

        **Curtis Nathan naming**: `{namespace}.{object}.{base}.{modifier}`
        where `namespace` = `system.theme.domain` (enter only the theme/domain value in the form), `object` = `group.component.element`,
        `base` = `category.concept.property`, `modifier` = `variant.state.scale.mode`.

  - type: dropdown
    id: hierarchy
    attributes:
      label: Hierarchy
      description: Which layer does this token belong to?
      options:
        - design-values
        - universal
        - system
        - semantic
        - component
    validations:
      required: true

  - type: input
    id: namespace
    attributes:
      label: Namespace (theme / domain)
      description: Optional theme + domain — do **not** include the hierarchy keyword. In the Curtis Nathan model this maps to `system.theme.domain`, but the form value should only include the theme/domain portion.
      placeholder: "light.color"
    validations:
      required: false

  - type: input
    id: object
    attributes:
      label: Object
      placeholder: "button.primary"
    validations:
      required: false

  - type: input
    id: base
    attributes:
      label: Base
      placeholder: "color.background"
    validations:
      required: false

  - type: input
    id: modifier
    attributes:
      label: Modifier
      placeholder: "hover.on-light"
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: Reason for Deletion
      placeholder: "Token is obsolete and has been consolidated into the new v2 system."
    validations:
      required: true

  - type: textarea
    id: impact-analysis
    attributes:
      label: Impact Analysis
      description: What tokens or components depend on this token?
      placeholder: |
        - Dependent tokens: action.color.background.primary
        - Affected components: button.primary, nav.item
    validations:
      required: true

  - type: input
    id: replacement
    attributes:
      label: Replacement Token (if any)
      placeholder: "action.color.background.primary"

  - type: textarea
    id: migration-guide
    attributes:
      label: Migration Guide
      placeholder: |
        Replace uses of `action.color.background.deprecated` with
        `action.color.background.primary`. Visuals are identical.

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I understand this is a breaking change.
          required: true
        - label: I have verified no higher-layer tokens depend on this token.
          required: true
        - label: I have notified consuming teams and provided a migration path.
          required: true

name: 🗑️ Delete Token
description: Request removal of a design token
title: "[DELETE] "
labels: ["token-request", "delete"]
body:
  - type: markdown
    attributes:
      value: |
        ## Delete a Design Token
        ⚠️ **Warning**: Deleting tokens may break existing implementations. Please ensure you have communicated this change with consuming teams.

  - type: dropdown
    id: category
    attributes:
      label: Token Category
      description: Which category contains the token?
      options:
        - color
        - typography
        - spacing
        - shadow
        - border
        - animation
        - breakpoint
    validations:
      required: true

  - type: input
    id: token-path
    attributes:
      label: Token Path
      description: The full path to the token using dot notation.
      placeholder: "brand.deprecated.oldBlue"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for Deletion
      description: Why should this token be removed?
      placeholder: "Token is deprecated and has been replaced by brand.primary.500"
    validations:
      required: true

  - type: input
    id: replacement
    attributes:
      label: Replacement Token (if any)
      description: What token should be used instead?
      placeholder: "brand.primary.500"

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I understand this may be a breaking change
          required: true
        - label: I have notified teams that consume these tokens
          required: true

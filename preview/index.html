<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Tokens Preview</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- ── Header ───────────────────────────────────────── -->
      <header class="header">
        <h1 class="header-title">🎨 Design Tokens</h1>
        <p class="header-sub">
          Browse, search, and copy tokens. Click any value to copy it.
          Click a <span class="header-hint-ref">reference</span> to jump to its definition.
        </p>
        <div class="search-row">
          <input
            class="search-input"
            type="text"
            id="searchInput"
            placeholder="Search by name, value, description…"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="reset-btn" id="resetBtn">Reset</button>
        </div>
        <div class="view-switch" role="tablist" aria-label="Preview mode">
          <button type="button" class="view-btn active" id="listViewBtn" data-view="list" role="tab" aria-selected="true">List</button>
          <button type="button" class="view-btn" id="graphViewBtn" data-view="graph" role="tab" aria-selected="false">Graph</button>
        </div>
        <div class="filter-tags" id="filterTags"></div>
      </header>

      <main class="main-content">
        <!-- ── Token grid ────────────────────────────────────── -->
        <section id="listView" class="list-view">
          <div id="categories" class="categories-grid">
            <div class="empty-state">Loading tokens...</div>
          </div>
        </section>

        <!-- ── Graph view ────────────────────────────────────── -->
        <section id="graphView" class="graph-view hidden" aria-hidden="true">
          <div class="graph-toolbar">
            <input
              class="graph-search-input"
              type="text"
              id="graphSearchInput"
              placeholder="Search node by token name..."
              autocomplete="off"
              spellcheck="false"
            />
            <button class="graph-btn" id="graphFitBtn" type="button">Fit View</button>
            <button class="graph-btn secondary" id="graphResetSelectionBtn" type="button">Clear Selection</button>
          </div>
          <div class="graph-layout">
            <div class="graph-canvas-wrap" id="graphCanvasWrap">
              <svg id="graphSvg" class="graph-svg" aria-label="Token dependency graph"></svg>
            </div>
            <aside id="graphInspector" class="graph-inspector">
              <h3 class="inspector-title">Graph Inspector</h3>
              <p class="inspector-muted">Select a node to inspect token details and relationships.</p>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
